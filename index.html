<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<!-- iOS PWA / Add to Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diamond IQ">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1929">


<title>Diamond IQ — BMP Baseball</title>
<style>
:root {
  --grass-dark: #1a5c2e;
  --grass-mid:  #1f7035;
  --grass-lite: #267a3a;
  --dirt:       #b87a3a;
  --dirt-dark:  #8b5a28;
  --clay:       #c4874a;
  --navy:       #0e1929;
  --panel:      #121f35;
  --panel2:     #1a2a45;
  --border:     #243650;
  --accent:     #c4874a;
  --blue:       #3a7bd4;
  --gold:       #f5a623;
  --red:        #e05252;
  --cyan:       #22d3ee;
  --white:      #f0f4ff;
  --muted:      #6a8aaa;
  --toolbar-h:   68px;
  --header-h:    52px;
  --countbar-h:  36px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--navy);
  font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  color: var(--white);
  touch-action: none;
  position: fixed;
  overscroll-behavior: none;
}

/* ── HEADER ─────────────────────────────────────── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px;
  padding-top: env(safe-area-inset-top, 0px);
  z-index: 50;
  gap: 8px;
}

.logo-mark {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--clay) 0%, #e8a060 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

#header h1 {
  font-size: 1.1rem; font-weight: 800;
  letter-spacing: -0.3px;
  flex: 1;
}
#header h1 span { color: var(--clay); }

.hdr-btn {
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px;
  padding: 6px 11px; font-size: 0.72rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.3px;
  white-space: nowrap;
  transition: all 0.15s;
  min-height: 34px;
}
.hdr-btn.active { background: var(--blue); border-color: #5a9bf4; color: #fff; }
.hdr-btn:active { opacity: 0.7; }

/* ── CANVAS AREA ────────────────────────────────── */
#field-wrap {
  position: fixed;
  top: calc(var(--header-h) + var(--countbar-h));
  bottom: calc(var(--toolbar-h) + var(--safe-bottom));
  left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--navy);
}

#field {
  display: block;
  touch-action: none;
  position: fixed;
  overscroll-behavior: none;
}

/* ── BOTTOM TOOLBAR ─────────────────────────────── */
#toolbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--toolbar-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  z-index: 50;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  gap: 0;
}
#toolbar::-webkit-scrollbar { display: none; }

.tool-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  min-width: 72px; height: var(--toolbar-h);
  background: transparent;
  border: none; border-right: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  padding: 0 6px;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.tool-btn:active { background: rgba(255,255,255,0.05); }
.tool-btn.active { background: rgba(58,123,212,0.18); color: var(--blue); border-bottom: 3px solid var(--blue); }
.tool-btn.active-orange { background: rgba(196,135,74,0.18); color: var(--clay); border-bottom: 3px solid var(--clay); }
.tool-btn.active-red { background: rgba(224,82,82,0.18); color: var(--red); border-bottom: 3px solid var(--red); }
.tool-btn.active-cyan { background: rgba(34,211,238,0.18); color: var(--cyan); border-bottom: 3px solid var(--cyan); }

.tool-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  background: rgba(255,255,255,0.06);
  transition: background 0.15s;
}
.tool-btn.active .tool-icon { background: rgba(58,123,212,0.25); }
.tool-btn.active-orange .tool-icon { background: rgba(196,135,74,0.25); }
.tool-btn.active-red .tool-icon { background: rgba(224,82,82,0.25); }
.tool-btn.active-cyan .tool-icon { background: rgba(34,211,238,0.25); }

.tool-label {
  font-size: 0.62rem; font-weight: 600;
  letter-spacing: 0.2px;
  white-space: nowrap;
}

.tool-divider {
  width: 1px; background: var(--border);
  height: 40px; flex-shrink: 0;
}

/* ── SLIDE-UP PANEL ─────────────────────────────── */
#panel-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 60;
  display: none;
  backdrop-filter: blur(2px);
}
#panel-overlay.open { display: block; }

#slide-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
  border-radius: 18px 18px 0 0;
  z-index: 70;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 75vh;
  overflow-y: auto;
  padding-bottom: calc(20px + var(--safe-bottom));
}
#slide-panel.open { transform: translateY(0); }

.panel-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 16px;
}

.panel-title {
  font-size: 1rem; font-weight: 800;
  padding: 0 18px 12px;
  color: var(--white);
  letter-spacing: -0.2px;
}
.panel-title span { color: var(--clay); }

/* Scenario grid */
.scenario-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 14px;
}

.scenario-card {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.scenario-card:active { transform: scale(0.97); background: #1e3050; }
.scenario-card h4 {
  font-size: 0.85rem; font-weight: 700;
  color: var(--white); margin-bottom: 3px;
}
.scenario-card p {
  font-size: 0.7rem; color: var(--muted);
  line-height: 1.35;
}
.scenario-card .base-icons {
  display: flex; gap: 4px; margin-bottom: 6px;
}
.base-dot {
  width: 9px; height: 9px;
  border-radius: 2px;
  border: 1.5px solid var(--muted);
  transform: rotate(45deg);
}
.base-dot.on { background: var(--gold); border-color: var(--gold); }

/* Tip banner */
#tip-banner {
  position: fixed;
  top: calc(var(--header-h) + 10px);
  left: 12px; right: 12px;
  background: rgba(18,31,53,0.96);
  border: 1px solid var(--clay);
  border-radius: 12px;
  padding: 10px 14px;
  z-index: 45;
  display: none;
  backdrop-filter: blur(8px);
}
#tip-banner.show { display: flex; gap: 10px; align-items: flex-start; }
#tip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
#tip-content h4 { font-size: 0.8rem; font-weight: 800; color: var(--clay); margin-bottom: 3px; }
#tip-content p { font-size: 0.72rem; color: #a0b4cc; line-height: 1.45; }
#tip-close {
  margin-left: auto; background: none; border: none;
  color: var(--muted); font-size: 18px; cursor: pointer;
  flex-shrink: 0; padding: 0 0 0 6px;
}

/* Count bar */
#count-bar {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  height: 36px;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px;
  gap: 16px;
  z-index: 44;
}

.count-group {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.7rem; font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.out-pip {
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 1.5px solid var(--muted);
  transition: all 0.2s;
}
.out-pip.filled { background: var(--red); border-color: var(--red); }

.count-sep { width: 1px; height: 18px; background: var(--border); }

.count-val {
  color: var(--white); font-size: 0.82rem;
  font-weight: 800; min-width: 20px; text-align: center;
}

.mini-btn {
  background: var(--panel); border: 1px solid var(--border);
  color: var(--muted); border-radius: 5px;
  padding: 2px 7px; font-size: 0.65rem; font-weight: 700;
  cursor: pointer; min-height: 24px; letter-spacing: 0.3px;
}
.mini-btn:active { opacity: 0.7; }

/* Toast */
#toast {
  position: fixed;
  bottom: calc(var(--toolbar-h) + var(--safe-bottom) + 12px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(26,42,69,0.97);
  border: 1px solid var(--border);
  color: var(--white);
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 0.78rem; font-weight: 600;
  z-index: 80;
  opacity: 0;
  transition: all 0.25s;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Mode cursor indicators */
body.mode-runner { cursor: crosshair; }
body.mode-arrow  { cursor: crosshair; }
body.mode-erase  { cursor: cell; }
body.mode-ball   { cursor: grab; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo-mark">⚾</div>
  <h1>Diamond <span>IQ</span></h1>
  <button class="hdr-btn active" id="btnLabels">Labels</button>
  <button class="hdr-btn" id="btnUndo">↩ Undo</button>
  <button class="hdr-btn" id="btnReset" style="border-color:#c04040;color:#e06060;">Reset</button>
</div>

<!-- COUNT BAR -->
<div id="count-bar">
  <div class="count-group">
    OUTS
    <div class="out-pip" id="op1"></div>
    <div class="out-pip" id="op2"></div>
    <button class="mini-btn" id="btnOut">+Out</button>
  </div>
  <div class="count-sep"></div>
  <div class="count-group" style="margin-left:auto">
    <span style="font-size:0.65rem;color:var(--muted)">Tap base = runner &nbsp;|&nbsp; Long-press player = remove</span>
  </div>
</div>

<!-- FIELD CANVAS -->
<div id="field-wrap">
  <canvas id="field"></canvas>
</div>

<!-- TIP BANNER -->
<div id="tip-banner">
  <div id="tip-icon">💡</div>
  <div id="tip-content">
    <h4 id="tip-title">Tip</h4>
    <p id="tip-text"></p>
  </div>
  <button id="tip-close">×</button>
</div>

<!-- BOTTOM TOOLBAR -->
<div id="toolbar">
  <button class="tool-btn active" data-mode="move" data-active-class="active">
    <div class="tool-icon">👆</div>
    <span class="tool-label">Move</span>
  </button>
  <button class="tool-btn" data-mode="runner" data-active-class="active-orange">
    <div class="tool-icon">🏃</div>
    <span class="tool-label">Runner</span>
  </button>
  <button class="tool-btn" data-mode="ball" data-active-class="active">
    <div class="tool-icon">⚾</div>
    <span class="tool-label">Ball</span>
  </button>
  <button class="tool-btn" data-mode="arrow" data-active-class="active-cyan">
    <div class="tool-icon">→</div>
    <span class="tool-label">Arrow</span>
  </button>
  <button class="tool-btn" data-mode="erase" data-active-class="active-red">
    <div class="tool-icon">✕</div>
    <span class="tool-label">Erase</span>
  </button>

  <div style="width:1px;background:var(--border);height:40px;flex-shrink:0;margin:0 2px"></div>

  <button class="tool-btn" id="btnScenarios" data-active-class="active-orange">
    <div class="tool-icon">📋</div>
    <span class="tool-label">Situations</span>
  </button>
  <button class="tool-btn" id="btnClearArrows" data-active-class="active-red">
    <div class="tool-icon">🧹</div>
    <span class="tool-label">Clr Arrows</span>
  </button>
</div>

<!-- SLIDE-UP PANEL -->
<div id="panel-overlay"></div>
<div id="slide-panel">
  <div class="panel-handle"></div>
  <div class="panel-title">Game <span>Situations</span></div>
  <div class="scenario-grid" id="scenarioGrid"></div>
  <div style="height:8px"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── Constants & helpers ────────────────────────────────────────────────────
const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');

const HEADER_H = 52;
const COUNT_H  = 36;
const FIELD_TOP = HEADER_H + COUNT_H; // canvas starts here

// Logical field size
const L = 700;
let sc = 1;

// ── Field geometry ─────────────────────────────────────────────────────────
// Home plate is the PIVOT of the fan, sitting near the bottom of the canvas.
// All angles are measured from home plate looking toward CF (straight up = -90°).
// The fan opens ±45° from centre (foul lines go to 1st/3rd at 45° each side).

const HOME_X = 350, HOME_Y = 610;   // home plate position (near bottom)
const BASE_LEN  = 160;               // distance home→1st / home→3rd (along foul line, logical)
const INFIELD_R = 225;               // radius of the infield dirt arc (from home)
const OF_R      = 530;               // outfield fence radius (from home)
const TRACK_W   = 22;                // warning track width

// Angles from home plate (0 = right, CCW positive in canvas = CW visually)
// Foul lines go UP-RIGHT (+45°) to 1st and UP-LEFT (135°) to 3rd
const ANG_1ST  = -Math.PI/4;        // -45°  (upper-right)
const ANG_3RD  = -Math.PI*3/4;      // -135° (upper-left)
const ANG_CF   = -Math.PI/2;        // straight up

// Base positions (home is pivot)
const bases = {
  home:   { x: HOME_X,                                              y: HOME_Y },
  first:  { x: HOME_X + BASE_LEN * Math.cos(ANG_1ST),              y: HOME_Y + BASE_LEN * Math.sin(ANG_1ST) },
  third:  { x: HOME_X + BASE_LEN * Math.cos(ANG_3RD),              y: HOME_Y + BASE_LEN * Math.sin(ANG_3RD) },
  second: { x: HOME_X + BASE_LEN*Math.SQRT2 * Math.cos(ANG_CF),    y: HOME_Y + BASE_LEN*Math.SQRT2 * Math.sin(ANG_CF) },
};

// Diamond centre (midpoint of 1st–3rd diagonal = midpoint of home–2nd line)
const CX = HOME_X;
const CY = HOME_Y - BASE_LEN * Math.SQRT2 / 2;   // halfway between home & 2nd

// Mound sits 60% of the way from home to 2nd base
const MOUND_Y = HOME_Y - BASE_LEN * Math.SQRT2 * 0.60;
const MOUND_X = HOME_X;

// ── State ──────────────────────────────────────────────────────────────────
let showLabels = true;
let mode = 'move';
let outs = 0;
let history = [];
let arrows = [];
let drawingArrow = null;
let players = [];
let runners = { first: null, second: null, third: null };
let ball = { x: MOUND_X, y: MOUND_Y };
let dragTarget = null;
let longPressTimer = null;

// ── Player factory ────────────────────────────────────────────────────────
function mkP(id, label, abbr, x, y, fill, stroke) {
  return { id, label, abbr, x, y, fill, stroke, r: 22, dragging: false };
}

function defaultPlayers() {
  // Infielder default offsets from each base (toward the infield arc)
  const b1 = bases.first,  b2 = bases.second,
        b3 = bases.third,  bh = bases.home;
  return [
    mkP('P',  'Pitcher',   'P',   MOUND_X,         MOUND_Y,           '#1c3a70','#4a8af4'),
    mkP('C',  'Catcher',   'C',   bh.x,            bh.y + 55,         '#1c3a70','#4a8af4'),
    mkP('1B', '1st Base',  '1B',  b1.x + 28,       b1.y + 18,         '#0f3d20','#32be6a'),
    mkP('2B', '2nd Base',  '2B',  b2.x + 52,       b2.y + 32,         '#0f3d20','#32be6a'),
    mkP('SS', 'Shortstop', 'SS',  b2.x - 52,       b2.y + 32,         '#0f3d20','#32be6a'),
    mkP('3B', '3rd Base',  '3B',  b3.x - 28,       b3.y + 18,         '#0f3d20','#32be6a'),
    mkP('LF', 'Left Field','LF',  HOME_X - 155,    HOME_Y - 370,      '#1a3010','#7ab830'),
    mkP('CF', 'Ctr Field', 'CF',  HOME_X,          HOME_Y - 420,      '#1a3010','#7ab830'),
    mkP('RF', 'Rt Field',  'RF',  HOME_X + 155,    HOME_Y - 370,      '#1a3010','#7ab830'),
  ];
}
players = defaultPlayers();

// ── Canvas resize ─────────────────────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('field-wrap');
  const wr = wrap.getBoundingClientRect();
  // Use full available space — field is a fan so square canvas fits it well
  const s = Math.min(wr.width, wr.height * 1.05, wr.width);
  canvas.width  = Math.round(s);
  canvas.height = Math.round(s);
  sc = s / L;
  draw();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

// ── Coord utils ───────────────────────────────────────────────────────────
const tx = v => v * sc;
function evPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) / sc, y: (src.clientY - r.top) / sc };
}
function d(ax,ay,bx,by) { return Math.hypot(ax-bx, ay-by); }

// ── Drawing ────────────────────────────────────────────────────────────────
function drawField() {
  const S = canvas.width;
  ctx.clearRect(0, 0, S, S);

  // ── Background ────────────────────────────────────────────────────────────
  ctx.fillStyle = '#0d1822';
  ctx.fillRect(0, 0, S, S);

  const hx = tx(HOME_X), hy = tx(HOME_Y);

  // ── Build the fan clip path (foul lines + outfield arc) ───────────────────
  // This defines the entire playable field shape: wedge from home to fence
  function fanPath() {
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(tx(HOME_X + OF_R * Math.cos(ANG_3RD)), tx(HOME_Y + OF_R * Math.sin(ANG_3RD)));
    ctx.arc(hx, hy, tx(OF_R), ANG_3RD, ANG_1ST);
    ctx.lineTo(hx, hy);
    ctx.closePath();
  }

  // ── 1. Outfield grass (fan shape) ─────────────────────────────────────────
  ctx.save();
  fanPath();
  ctx.clip();

  // Grass base fill
  const og = ctx.createRadialGradient(hx, hy, tx(80), hx, hy, tx(OF_R));
  og.addColorStop(0,   '#1d7236');
  og.addColorStop(0.5, '#196830');
  og.addColorStop(1,   '#0f5020');
  ctx.fillStyle = og;
  ctx.fillRect(0, 0, S, S);

  // ── Vertical mowing stripes (like BMP diagram) ────────────────────────────
  const stripeW = tx(28);
  for (let sx = 0; sx < S; sx += stripeW * 2) {
    ctx.fillStyle = 'rgba(0,0,0,0.07)';
    ctx.fillRect(sx, 0, stripeW, S);
  }

  ctx.restore();

  // ── 2. Warning track (clay-coloured ring inside fence) ────────────────────
  ctx.save();
  fanPath();
  ctx.clip();
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.lineTo(tx(HOME_X + OF_R * Math.cos(ANG_3RD)), tx(HOME_Y + OF_R * Math.sin(ANG_3RD)));
  ctx.arc(hx, hy, tx(OF_R), ANG_3RD, ANG_1ST);
  ctx.lineTo(hx, hy);
  ctx.arc(hx, hy, tx(OF_R - TRACK_W), ANG_1ST, ANG_3RD, true);
  ctx.closePath();
  ctx.fillStyle = '#8b6828';
  ctx.fill();
  ctx.restore();

  // ── 3. Outfield fence line ────────────────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.arc(hx, hy, tx(OF_R - TRACK_W), ANG_3RD, ANG_1ST);
  ctx.strokeStyle = 'rgba(255,255,255,0.65)';
  ctx.lineWidth = tx(2.8);
  ctx.stroke();
  ctx.restore();

  // ── 4. Foul lines (from home to fence) ────────────────────────────────────
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = tx(2);
  [[ANG_1ST],[ANG_3RD]].forEach(([ang]) => {
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(tx(HOME_X + OF_R * Math.cos(ang)), tx(HOME_Y + OF_R * Math.sin(ang)));
    ctx.stroke();
  });
  ctx.restore();

  // ── 5. Infield dirt arc ───────────────────────────────────────────────────
  // Extend the arc beyond 2nd base. ANG_3RD=-135°, ANG_1ST=-45°.
  // Push each side ~30° further so the dirt wraps past 2nd, clipped to the fan.
  const DIRT_ANG_START = ANG_3RD - Math.PI * 0.22;
  const DIRT_ANG_END   = ANG_1ST + Math.PI * 0.22;
  const DIRT_R_EXT     = INFIELD_R + 38;
  ctx.save();
  fanPath();
  ctx.clip();
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.arc(hx, hy, tx(DIRT_R_EXT), DIRT_ANG_START, DIRT_ANG_END);
  ctx.closePath();
  const dg = ctx.createRadialGradient(hx, hy, tx(30), hx, hy, tx(DIRT_R_EXT));
  dg.addColorStop(0,   '#c89050');
  dg.addColorStop(0.5, '#b07838');
  dg.addColorStop(1,   '#8a5520');
  ctx.fillStyle = dg;
  ctx.fill();
  ctx.restore();

  // ── 6. Infield grass (diamond interior between bases) ─────────────────────
  // Re-paint green over the dirt for the infield grass square
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tx(bases.home.x),   tx(bases.home.y));
  ctx.lineTo(tx(bases.first.x),  tx(bases.first.y));
  ctx.lineTo(tx(bases.second.x), tx(bases.second.y));
  ctx.lineTo(tx(bases.third.x),  tx(bases.third.y));
  ctx.closePath();
  ctx.fillStyle = '#1a6832';
  ctx.fill();
  // Vertical stripes inside diamond
  ctx.clip();
  for (let sx = 0; sx < S; sx += tx(26)*2) {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(sx, 0, tx(26), S);
  }
  ctx.restore();

  // ── 7. Home plate dirt circle ─────────────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.arc(hx, hy, tx(52), 0, Math.PI*2);
  const hdg = ctx.createRadialGradient(hx, hy-tx(8), tx(5), hx, hy, tx(52));
  hdg.addColorStop(0,   '#c89050');
  hdg.addColorStop(1,   '#8a5520');
  ctx.fillStyle = hdg;
  ctx.fill();
  ctx.restore();

  // ── 8. Pitcher's mound ────────────────────────────────────────────────────
  const mx = tx(MOUND_X), my = tx(MOUND_Y);
  ctx.save();
  // Mound oval (slightly taller than wide for 3D feel)
  ctx.beginPath();
  ctx.ellipse(mx, my, tx(22), tx(18), 0, 0, Math.PI*2);
  const mg = ctx.createRadialGradient(mx, my - tx(5), tx(2), mx, my, tx(22));
  mg.addColorStop(0, '#d49858');
  mg.addColorStop(1, '#9a6530');
  ctx.fillStyle = mg;
  ctx.fill();
  // Mound edge highlight
  ctx.strokeStyle = 'rgba(180,130,60,0.5)';
  ctx.lineWidth = tx(1.5);
  ctx.stroke();
  // Pitching rubber — white rectangle centered exactly on mound
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(mx - tx(8), my - tx(3), tx(16), tx(6));
  ctx.restore();

  // ── 9. Basepath lines ─────────────────────────────────────────────────────
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.30)';
  ctx.lineWidth = tx(2.2);
  ctx.beginPath();
  ctx.moveTo(tx(bases.home.x),   tx(bases.home.y));
  ctx.lineTo(tx(bases.first.x),  tx(bases.first.y));
  ctx.lineTo(tx(bases.second.x), tx(bases.second.y));
  ctx.lineTo(tx(bases.third.x),  tx(bases.third.y));
  ctx.closePath();
  ctx.stroke();
  ctx.restore();

  // ── 10. Batter's boxes ────────────────────────────────────────────────────
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = tx(1.2);
  // Rotate with the foul line angle — boxes sit alongside home plate
  const BW = 16, BH = 36;
  [[-28, 0],[28, 0]].forEach(([ox]) => {
    ctx.strokeRect(tx(bases.home.x + ox - BW/2), tx(bases.home.y - BH*0.6), tx(BW), tx(BH));
  });
  ctx.restore();

  // ── 11. Bases ─────────────────────────────────────────────────────────────
  drawSquareBase(bases.first,  10);
  drawSquareBase(bases.second, 10);
  drawSquareBase(bases.third,  10);
  drawHomePlate(bases.home);
}

function drawSquareBase(b, sz) {
  ctx.save();
  ctx.translate(tx(b.x), tx(b.y));
  ctx.rotate(Math.PI/4);
  ctx.fillStyle = '#fff';
  const s = tx(sz);
  ctx.fillRect(-s, -s, s*2, s*2);
  ctx.restore();
}

function drawHomePlate(h) {
  ctx.save();
  const s = tx(12);
  ctx.beginPath();
  ctx.moveTo(tx(h.x),    tx(h.y) + s*0.9);
  ctx.lineTo(tx(h.x)-s,  tx(h.y) + s*0.3);
  ctx.lineTo(tx(h.x)-s,  tx(h.y) - s*0.5);
  ctx.lineTo(tx(h.x)+s,  tx(h.y) - s*0.5);
  ctx.lineTo(tx(h.x)+s,  tx(h.y) + s*0.3);
  ctx.closePath();
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.restore();
}

function drawArrowShape(x1,y1,x2,y2,color,dashed,alpha=0.9) {
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
  if (len < 8) return;
  const ang = Math.atan2(dy,dx);
  const head = tx(16);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.fillStyle   = color;
  ctx.lineWidth   = tx(2.8);
  ctx.lineCap = 'round';
  if (dashed) ctx.setLineDash([tx(8), tx(5)]);
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - head*Math.cos(ang-0.45), y2 - head*Math.sin(ang-0.45));
  ctx.lineTo(x2 - head*Math.cos(ang+0.45), y2 - head*Math.sin(ang+0.45));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawAllArrows() {
  arrows.forEach(a => drawArrowShape(tx(a.x1),tx(a.y1),tx(a.x2),tx(a.y2), a.color||'#22d3ee', false));
  if (drawingArrow) {
    drawArrowShape(tx(drawingArrow.x1),tx(drawingArrow.y1),tx(drawingArrow.x2),tx(drawingArrow.y2),'#22d3ee',true,0.7);
  }
}

function drawRunners() {
  ['first','second','third'].forEach(key => {
    const rn = runners[key];
    if (!rn) return;
    const x = tx(rn.x), y = tx(rn.y), r = tx(18);
    ctx.save();
    ctx.shadowColor = '#f5a623'; ctx.shadowBlur = tx(14);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = '#7a3800'; ctx.fill();
    ctx.strokeStyle = '#f5a623'; ctx.lineWidth = tx(2.8); ctx.stroke();
    ctx.shadowBlur = 0;
    if (showLabels) {
      ctx.fillStyle='#fff';
      ctx.font = `bold ${tx(10)}px -apple-system,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('R', x, y);
    }
    ctx.restore();
  });
}

function drawBall() {
  const x = tx(ball.x), y = tx(ball.y), r = tx(11);
  ctx.save();
  ctx.shadowColor='#ffe000'; ctx.shadowBlur=tx(16);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  const bg = ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1, x,y,r);
  bg.addColorStop(0,'#fffde0'); bg.addColorStop(1,'#d4b800');
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=tx(1); ctx.stroke();
  ctx.shadowBlur=0;
  // Stitches
  ctx.strokeStyle='#c00'; ctx.lineWidth=tx(1.2);
  ctx.beginPath(); ctx.arc(x,y,r*0.55,-0.5,0.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,r*0.55,Math.PI-0.5,Math.PI+0.5); ctx.stroke();
  ctx.restore();
}

function drawPlayers() {
  players.forEach(p => {
    const x=tx(p.x), y=tx(p.y), r=tx(p.r);
    ctx.save();
    if (p.dragging) { ctx.shadowColor='#fff'; ctx.shadowBlur=tx(18); }
    // Circle
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=p.fill; ctx.fill();
    ctx.strokeStyle=p.stroke; ctx.lineWidth=tx(2.8); ctx.stroke();
    ctx.shadowBlur=0;
    if (showLabels) {
      const fs = p.abbr.length>2 ? tx(8.5) : tx(10.5);
      ctx.fillStyle='#fff';
      ctx.font=`800 ${fs}px -apple-system,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.abbr, x, y);
    }
    ctx.restore();
  });
}

function draw() {
  drawField();
  drawAllArrows();
  drawRunners();
  drawBall();
  drawPlayers();
}

// ── History ────────────────────────────────────────────────────────────────
function snapshot() {
  history.push({
    players: JSON.parse(JSON.stringify(players)),
    runners: JSON.parse(JSON.stringify(runners)),
    ball: { ...ball },
    arrows: JSON.parse(JSON.stringify(arrows)),
  });
  if (history.length > 40) history.shift();
}
function undo() {
  if (!history.length) { toast('Nothing to undo'); return; }
  const h = history.pop();
  players = h.players; runners = h.runners;
  ball = h.ball; arrows = h.arrows;
  draw();
}

// ── Touch/Mouse events ─────────────────────────────────────────────────────
function onDown(e) {
  e.preventDefault();
  const pos = evPos(e);

  if (mode === 'arrow') {
    snapshot();
    drawingArrow = { x1:pos.x, y1:pos.y, x2:pos.x, y2:pos.y };
    return;
  }
  if (mode === 'erase') {
    snapshot();
    eraseAt(pos.x, pos.y);
    draw(); return;
  }
  if (mode === 'runner') {
    snapshot();
    toggleRunner(pos.x, pos.y);
    return;
  }

  // move / ball modes
  snapshot();

  // Ball?
  if (d(pos.x,pos.y,ball.x,ball.y) < 20) {
    dragTarget = { type:'ball' }; return;
  }

  // Runners?
  for (const key of ['first','second','third']) {
    const rn = runners[key];
    if (rn && d(pos.x,pos.y,rn.x,rn.y) < 26) {
      dragTarget = { type:'runner', key };
      // Long-press to remove
      longPressTimer = setTimeout(() => {
        runners[key] = null; dragTarget = null;
        draw(); toast('Runner removed');
      }, 600);
      return;
    }
  }

  // Players?
  for (let i = players.length-1; i >= 0; i--) {
    const p = players[i];
    if (d(pos.x,pos.y,p.x,p.y) < p.r+8) {
      p.dragging = true;
      dragTarget = { type:'player', index:i };
      // Long-press to remove player
      longPressTimer = setTimeout(() => {
        const removed = players.splice(i,1)[0];
        dragTarget = null;
        draw(); toast(`${removed.label} removed`);
      }, 600);
      return;
    }
  }
}

function onMove(e) {
  e.preventDefault();
  if (!dragTarget && !drawingArrow) return;
  const pos = evPos(e);

  // Cancel long press if moved
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }

  if (drawingArrow) {
    drawingArrow.x2 = pos.x; drawingArrow.y2 = pos.y;
    draw(); return;
  }

  if (dragTarget.type === 'ball')  { ball.x=pos.x; ball.y=pos.y; }
  else if (dragTarget.type === 'player') {
    const p = players[dragTarget.index];
    p.x=pos.x; p.y=pos.y;
  }
  else if (dragTarget.type === 'runner') {
    const rn = runners[dragTarget.key];
    if (rn) { rn.x=pos.x; rn.y=pos.y; }
  }
  draw();
}

function onUp(e) {
  e.preventDefault();
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }

  if (drawingArrow) {
    const pos = evPos(e);
    drawingArrow.x2=pos.x; drawingArrow.y2=pos.y;
    if (d(drawingArrow.x1,drawingArrow.y1,drawingArrow.x2,drawingArrow.y2) > 25)
      arrows.push({...drawingArrow});
    drawingArrow = null;
    draw(); return;
  }

  if (dragTarget) {
    if (dragTarget.type==='player') players[dragTarget.index].dragging=false;
    if (dragTarget.type==='runner') {
      // Snap to nearest base
      const rn = runners[dragTarget.key];
      if (rn) {
        let best=null, bestD=50;
        for (const [bk,bv] of Object.entries(bases)) {
          if (bk==='home') continue;
          const dd=d(rn.x,rn.y,bv.x,bv.y);
          if (dd<bestD) { bestD=dd; best=bk; }
        }
        if (best) { rn.x=bases[best].x; rn.y=bases[best].y; }
      }
    }
    dragTarget=null;
    draw();
  }
}

function eraseAt(x,y) {
  const prevLen = arrows.length;
  arrows = arrows.filter(a => {
    const mx=(a.x1+a.x2)/2, my=(a.y1+a.y2)/2;
    return d(x,y,mx,my) > 30;
  });
  if (arrows.length === prevLen) toast('Tap near arrow midpoint to erase');
}

// ── Runner placement ───────────────────────────────────────────────────────
function toggleRunner(x,y) {
  const keys = ['first','second','third'];
  for (const key of keys) {
    const b = bases[key];
    if (d(x,y,b.x,b.y) < 40) {
      runners[key] = runners[key] ? null : { x:b.x, y:b.y };
      draw();
      toast(runners[key] ? `Runner on ${key}` : `Runner off ${key}`);
      return;
    }
  }
  // Put runner on nearest open base
  let bestKey=null, bestD=Infinity;
  for (const key of keys) {
    const b=bases[key];
    const dd=d(x,y,b.x,b.y);
    if (dd<bestD && !runners[key]) { bestD=dd; bestKey=key; }
  }
  if (bestKey && bestD < 120) {
    runners[bestKey] = { x:bases[bestKey].x, y:bases[bestKey].y };
    draw(); toast(`Runner placed on ${bestKey}`);
  }
}

      'P' :{x:HOME_X-12,      y:HOME_Y-60},
    }
  },
  {
    id:'relay_rf', title:'RF Relay', bases:[0,0,0],
    desc:'Double cut from right field',
    tip:['Right Field Relay — Double Cut','2B goes out as the first cut near the RF grass edge. SS trails as second cut. 1B covers 1st. 3B covers 3rd. P backs up home.'],
    runners:{ first:true },
    playerMods:{
      '2B':{x:HOME_X+130,     y:HOME_Y-310},
      'SS':{x:HOME_X+65,      y:HOME_Y-230},
      '1B':{x:b1.x+10,        y:b1.y+12},
      'P' :{x:HOME_X+12,      y:HOME_Y-60},
    }
  },
];

// Build scenario cards
const grid = document.getElementById('scenarioGrid');
scenarios.forEach(sc => {
  const card = document.createElement('div');
  card.className = 'scenario-card';
  const [b1,b2,b3] = sc.bases;
  card.innerHTML = `
    <div class="base-icons">
      <div class="base-dot ${b3?'on':''}"></div>
      <div class="base-dot ${b2?'on':''}"></div>
      <div class="base-dot ${b1?'on':''}"></div>
    </div>
    <h4>${sc.title}</h4>
    <p>${sc.desc}</p>
  `;
  card.addEventListener('click', () => {
    applyScenario(sc);
    closePanel();
  });
  grid.appendChild(card);
});

function applyScenario(sc) {
  snapshot();
  players = defaultPlayers();
  runners = { first:null, second:null, third:null };
  arrows = [];

  // Set runners
  if (sc.runners.first)  runners.first  = { x:bases.first.x,  y:bases.first.y };
  if (sc.runners.second) runners.second = { x:bases.second.x, y:bases.second.y };
  if (sc.runners.third)  runners.third  = { x:bases.third.x,  y:bases.third.y };

  // Apply position mods
  if (sc.playerMods) {
    players.forEach(p => {
      if (sc.playerMods[p.id]) {
        p.x = sc.playerMods[p.id].x;
        p.y = sc.playerMods[p.id].y;
      }
    });
  }

  // Ball to mound
  ball = { x:MOUND_X, y:MOUND_Y };

  if (sc.tip) showTip(sc.tip[0], sc.tip[1]);
  draw();
  toast(sc.title + ' loaded');
}

// ── Panel open/close ───────────────────────────────────────────────────────
function openPanel() {
  document.getElementById('slide-panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
}
function closePanel() {
  document.getElementById('slide-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
}
document.getElementById('btnScenarios').addEventListener('click', openPanel);
document.getElementById('panel-overlay').addEventListener('click', closePanel);

// ── Init ───────────────────────────────────────────────────────────────────
resize();
const ro = new ResizeObserver(resize);
ro.observe(document.getElementById('field-wrap'));
</script>
